name: Deploy to GitHub Pages

on:
  # Build + deploy on every push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# GITHUB_TOKEN permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy at a time. Newer pushes cancel queued deploys
# but never interrupt one already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          path: .
          node-version: 20
          # Do not set `package-manager` here. The `packageManager` field in
          # package.json (e.g. `pnpm@9.15.0`) is the single source of truth.
          # Setting both produces ERR_PNPM_BAD_PM_VERSION.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
